  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #111118; --surface2: #18181f;
      --border: rgba(255,255,255,0.07); --gold: #c9a84c; --gold-light: #e8c96e;
      --gold-dim: rgba(201,168,76,0.12); --gold-border: rgba(201,168,76,0.3);
      --text: #f0ede6; --text-muted: #8a8699; --text-soft: #c5c0d4;
      --accent: #7c5cbf; --radius: 12px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; }

    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 18px 60px; background: rgba(10,10,15,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-links { display: flex; gap: 32px; list-style: none; align-items: center; }
    .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 0.88rem; font-weight: 500; transition: color 0.2s; }
    .nav-links a:hover { color: var(--gold); }

    /* PROFILE HERO */
    .profile-hero { padding: 140px 60px 60px; position: relative; overflow: hidden; }
    .profile-hero-bg { position: absolute; inset: 0; background: radial-gradient(ellipse 70% 80% at 20% 50%, rgba(124,92,191,0.15) 0%, transparent 60%); }
    .profile-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; gap: 50px; position: relative; }
    .profile-avatar { width: 160px; height: 160px; border-radius: 50%; border: 3px solid var(--gold-border); overflow: hidden; flex-shrink: 0; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 700; color: var(--gold); }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-info { flex: 1; }
    .profile-badge { display: inline-flex; align-items: center; gap: 8px; background: var(--gold-dim); border: 1px solid var(--gold-border); color: var(--gold-light); padding: 5px 14px; border-radius: 100px; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 14px; }
    .profile-name { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 4vw, 3.2rem); font-weight: 900; line-height: 1.1; margin-bottom: 16px; }
    .profile-stats { display: flex; gap: 32px; margin-top: 24px; flex-wrap: wrap; }
    .profile-stat { text-align: center; }
    .profile-stat-num { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700; color: var(--gold); }
    .profile-stat-label { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }

    /* TABS */
    .tabs-bar { border-bottom: 1px solid var(--border); margin: 0; padding: 0 60px; background: var(--surface); position: sticky; top: 73px; z-index: 50; }
    .tabs-inner { max-width: 1100px; margin: 0 auto; display: flex; gap: 0; }
    .tab-btn { padding: 18px 28px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 600; color: var(--text-muted); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; margin-bottom: -1px; }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
    .tab-count { background: var(--surface2); color: var(--text-muted); font-size: 0.68rem; font-weight: 700; padding: 2px 7px; border-radius: 100px; }
    .tab-btn.active .tab-count { background: var(--gold-dim); color: var(--gold); }

    /* CONTENT */
    .content-area { max-width: 1100px; margin: 0 auto; padding: 50px 60px 100px; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; animation: fadeUp 0.4s ease both; }

    /* CARDS */
    .items-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .item-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: all 0.3s; cursor: pointer; }
    .item-card:hover { border-color: var(--gold-border); transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
    .item-thumb { width: 100%; aspect-ratio: 16/9; position: relative; overflow: hidden; background: var(--surface2); display: flex; align-items: center; justify-content: center; }
    .item-thumb img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .item-thumb-bg { position: absolute; inset: 0; }
    .item-type-badge { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); border: 1px solid rgba(201,168,76,0.3); color: var(--gold); font-size: 0.68rem; font-weight: 700; padding: 4px 10px; border-radius: 4px; letter-spacing: 0.06em; text-transform: uppercase; z-index: 2; }
    .item-play { position: relative; z-index: 2; width: 44px; height: 44px; background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; border: 1px solid rgba(255,255,255,0.2); }

    /* BOOK THUMB */
    .book-thumb { aspect-ratio: 3/4; }

    .item-body { padding: 18px; }
    .item-topic { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
    .item-title { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; line-height: 1.3; margin-bottom: 14px; }
    .item-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
    .item-date { font-size: 0.75rem; color: var(--text-muted); }
    .dl-btn { background: var(--gold-dim); color: var(--gold); border: 1px solid rgba(201,168,76,0.25); padding: 6px 14px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
    .dl-btn:hover { background: var(--gold); color: #0a0a0f; }

    /* EMPTY */
    .empty { text-align: center; padding: 80px 20px; color: var(--text-muted); }
    .empty-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.4; }

    /* BACK BTN */
    .back-btn { display: inline-flex; align-items: center; gap: 8px; color: var(--text-muted); text-decoration: none; font-size: 0.85rem; font-weight: 500; transition: color 0.2s; margin-bottom: 24px; background: none; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; }

    /* ── HAMBURGER MENU ── */
    .hamburger { display:none; flex-direction:column; gap:5px; cursor:pointer; padding:4px; background:none; border:none; z-index:200; }
    .hamburger span { display:block; width:24px; height:2px; background:var(--text); border-radius:2px; transition:all 0.3s ease; }
    .hamburger.open span:nth-child(1) { transform:translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity:0; }
    .hamburger.open span:nth-child(3) { transform:translateY(-7px) rotate(-45deg); }

    /* Mobile nav drawer */
    .mobile-nav { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(10,10,15,0.98); backdrop-filter:blur(20px); z-index:150; flex-direction:column; align-items:center; justify-content:center; gap:10px; }
    .mobile-nav.open { display:flex; }

    .mobile-nav a:hover { color:var(--gold); }
    .mobile-nav-close { position:absolute; top:24px; right:24px; background:none; border:none; color:var(--text); font-size:1.6rem; cursor:pointer; }

    /* ── GLOBAL MOBILE FIXES ── */
    @media (max-width: 768px) {
      /* Nav */
      
      .nav-links { display:none !important; }

      /* Hero */
      .hero { padding:60px 20px 60px; min-height:auto; }

      .hero-actions { flex-direction:column; align-items:center; gap:12px; }
      .hero-actions a, .hero-actions button { width:100%; max-width:320px; justify-content:center; }
      .hero-stats { gap:24px; margin-top:48px; }
      .divider { display:none; }

      /* Sections */
      section { padding:60px 20px; }

      h2.section-title { font-size:clamp(1.6rem,6vw,2.2rem); max-width:100%; }

      /* Types grid */

      /* Search */

      /* Ministers preview */

      /* Newsletter */
      .newsletter { padding:44px 20px; margin:0 16px 60px; border-radius:14px; }
      .newsletter h2 { font-size:1.6rem; }
      .email-row { flex-direction:column; gap:10px; }
      .email-input { min-width:unset; width:100%; }

      /* Footer */
      footer { padding:50px 20px 30px; }
      .footer-top { grid-template-columns:1fr; gap:28px; }
      .footer-bottom { flex-direction:column; align-items:flex-start; gap:16px; }

      /* Page heroes (inner pages) */
      .page-hero { padding:110px 20px 60px; }
      .page-hero h1 { font-size:clamp(2rem,8vw,3rem); }

      /* Doc layout (privacy/terms) */
      .doc-layout { grid-template-columns:1fr; padding:30px 20px 60px; gap:30px; }
      .toc { display:none; }

      /* Contact / About */
      .contact-grid, .about-grid, .values-grid { grid-template-columns:1fr !important; }
      .contact-info { padding:30px 20px !important; }

      /* Minister cards grid */
      .minister-card { padding:24px 14px; }
      .minister-photo { width:80px; height:80px; }
    }

    @media (max-width: 480px) {
      h1.hero-title { font-size:2rem; }
      .books-row { grid-template-columns:repeat(2,1fr); }
      .types-grid { grid-template-columns:repeat(2,1fr); }
      .ministers-grid { grid-template-columns:1fr; }
      #ministers-preview { grid-template-columns:1fr !important; }
      .sermon-title-featured { font-size:1.1rem; }

    }

    @media screen and (max-width: 768px) {
      
    }

  
    @media (max-width: 768px) {

      .doc-layout { padding-top: 20px !important; }
    }
  
    /* ── MOBILE NAV — app style ── */
    @media (max-width: 768px) {
      /* Top bar: hamburger left, logo center */

    }

  </style>

      .select('*')
      .ilike('speaker_author', ministerName)
      .order('created_at', { ascending: false });

    if (error || !data) return;
    allItems = data;

    // Use cover image of first item as avatar if available
    var withCover = data.find(function(d) { return d.cover_image_url; });
    if (withCover) {
      var av = document.getElementById('profile-avatar');
      av.innerHTML = '<img src="' + withCover.cover_image_url + '" alt="' + ministerName + '"/>';
    }

    var sermons = data.filter(function(d) { return d.type === 'audio' || d.type === 'video'; });
    var books   = data.filter(function(d) { return d.type === 'ebook'; });
    var notes   = data.filter(function(d) { return d.type === 'notes'; });

    // Update stats
    document.getElementById('stat-total').textContent   = data.length;
    document.getElementById('stat-sermons').textContent = sermons.length;
    document.getElementById('stat-books').textContent   = books.length;
    document.getElementById('stat-notes').textContent   = notes.length;

    document.getElementById('tc-all').textContent     = data.length;
    document.getElementById('tc-sermons').textContent = sermons.length;
    document.getElementById('tc-books').textContent   = books.length;
    document.getElementById('tc-notes').textContent   = notes.length;

    renderGrid('grid-all', data);
    renderGrid('grid-sermons', sermons);
    renderGrid('grid-books', books);
    renderGrid('grid-notes', notes);
  }

  function renderGrid(gridId, items) {
    var grid = document.getElementById(gridId);
    if (!items.length) {
      grid.innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">&#10011;</div><p>Nothing here yet.</p></div>';
      return;
    }
    grid.innerHTML = items.map(function(item, i) {
      var isBook = item.type === 'ebook';
      var thumbClass = isBook ? 'item-thumb book-thumb' : 'item-thumb';
      var bgStyle = isBook ? bookGradients[i % bookGradients.length] : bgGradients[i % bgGradients.length];
      var coverHtml = item.cover_image_url
        ? '<img src="' + item.cover_image_url + '" alt="cover"/>'
        : '<div class="item-thumb-bg" style="background:' + bgStyle + '"></div>';
      var playIcon = isBook ? '&#128215;' : (item.type === 'notes' ? '&#128214;' : '&#9658;');

      return '<div class="item-card">'
        + '<div class="' + thumbClass + '">'
        + coverHtml
        + '<div class="item-play" style="position:relative;z-index:2;">' + playIcon + '</div>'
        + '<div class="item-type-badge">' + typeLabel(item.type) + '</div>'
        + '</div>'
        + '<div class="item-body">'
        + '<div class="item-topic">' + (item.topic || item.bible_book || 'General') + '</div>'
        + '<div class="item-title">' + item.title + '</div>'
        + '<div class="item-meta">'
        + '<span class="item-date">' + fmtDate(item.created_at) + '</span>'
        + (item.file_url ? '<button class="dl-btn" onclick="dlFile(this)" data-url="' + item.file_url + '" data-title="' + item.title.replace(/"/g,"'") + '">&#11015; Download</button>' : '<span style="font-size:0.75rem;color:var(--text-muted)">No file</span>')
        + '</div></div></div>';
    }).join('');
  }

  function showTab(name, btn) {
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
    btn.classList.add('active');
    document.getElementById('panel-' + name).classList.add('active');
  }

  function dlFile(btn) {
    var url = btn.getAttribute('data-url');
    var title = btn.getAttribute('data-title') || 'download';
    showToast('Downloading ' + title.substring(0, 30) + '...');
    fetch(url).then(function(r) { return r.blob(); }).then(function(blob) {
      var ext = url.split('.').pop().split('?')[0] || 'file';
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = title.replace(/[^a-z0-9]/gi,'_') + '.' + ext;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(a.href);
      showToast('Download complete!', true);
    }).catch(function() { window.location.href = url; });
  }

  function showToast(msg, done) {
    var t = document.getElementById('gw-toast');
    if (!t) {
      t = document.createElement('div'); t.id = 'gw-toast';
      t.style.cssText = 'position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(100px);background:#111118;border:1px solid rgba(201,168,76,0.4);border-radius:10px;padding:13px 22px;font-size:0.87rem;font-weight:500;box-shadow:0 16px 40px rgba(0,0,0,0.5);transition:transform 0.35s ease;z-index:9999;color:#f0ede6;white-space:nowrap;';
      document.body.appendChild(t);
    }
    t.textContent = msg;
    t.style.transform = 'translateX(-50%) translateY(0)';
    if (done) setTimeout(function() { t.style.transform = 'translateX(-50%) translateY(100px)'; }, 2500);
  }
</script><script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('/sw.js');
    });
  }
</script>
